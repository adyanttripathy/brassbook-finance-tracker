name: Build Executables

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            script: dist:win
          - os: macos-latest
            label: macOS
            script: dist:mac
          - os: ubuntu-latest
            label: Linux
            script: dist:linux

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.label }} executable
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Publish Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List files
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "BrassBook v1.0.${{ github.run_number }}"
          body: |
            ## 💰 BrassBook Finance Tracker

            Download the installer for your platform below:

            | Platform | File |
            |---|---|
            | 🪟 Windows | `BrassBook-Setup-*.exe` |
            | 🍎 macOS (Intel) | `BrassBook-*-x64.dmg` |
            | 🍎 macOS (Apple Silicon) | `BrassBook-*-arm64.dmg` |
            | 🐧 Linux | `BrassBook-*.AppImage` |

            ### Features
            - Track income & expenses across 14 categories
            - Monthly budgets with live progress bars
            - Savings goals with deadline tracking
            - AI-powered money coach with personalised tips
            - Earn brass points when you save more than last month
            - Unlock & share badges on social media
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
